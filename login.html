<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Dividend - Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#fafaf7;
      --paper:#fff;
      --ink:#0a0a0a;
      --muted:#6b7280;
      --bd:#e8e5dc;
      --bd2:#d8d3c4;
      --grn:#0f9d6b;
      --grn-soft:#e6f7ef;
      --red:#d63939;
      --red-soft:rgba(214,57,57,.1);
      --serif:Georgia,"Times New Roman",serif;
      --sans:Arial,"Helvetica Neue",sans-serif;
    }
    body{min-height:100vh;background:var(--bg);font-family:var(--sans);color:var(--ink);display:grid;place-items:center;padding:24px}
    .card{width:min(460px,100%);background:var(--paper);border:1px solid var(--bd2);border-radius:16px;padding:30px;box-shadow:0 24px 70px rgba(10,10,10,.12)}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:26px}
    .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--serif);font-weight:700}
    .brand-name{font-weight:700;letter-spacing:-.01em}
    .kicker{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);margin-bottom:10px}
    h1{font-family:var(--serif);font-size:34px;line-height:1.08;margin-bottom:8px}
    .sub{font-size:15px;color:var(--muted);line-height:1.55;margin-bottom:22px}
    .field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
    label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    input{font:inherit;font-size:15px;border:1px solid var(--bd2);border-radius:10px;padding:13px 14px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
    input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(15,157,107,.12)}
    .hint{font-size:12px;color:var(--muted);line-height:1.45;margin:-4px 0 16px}
    button{width:100%;border:0;border-radius:999px;background:var(--ink);color:#fff;font:inherit;font-weight:700;padding:13px 18px;cursor:pointer;transition:transform .15s,background .15s}
    button:hover{background:var(--grn);transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .message{display:none;margin-top:14px;border-radius:10px;padding:12px 13px;font-size:13px;line-height:1.45}
    .message.show{display:block}
    .message.error{background:var(--red-soft);color:var(--red);border:1px solid rgba(214,57,57,.24)}
    .message.success{background:var(--grn-soft);color:#0b6e4b;border:1px solid rgba(15,157,107,.24)}
    .switch{margin-top:18px;text-align:center;font-size:14px;color:var(--muted)}
    .switch a{color:var(--ink);font-weight:700;text-decoration:none}
    .switch a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-mark">DD</div>
      <div class="brand-name">Daily Dividend</div>
    </div>

    <div class="kicker">Member Login</div>
    <h1>Welcome back.</h1>
    <p class="sub">Log in with your name plus either your email or phone number.</p>

    <form id="login-form">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">Email optional</label>
        <input id="email" name="email" type="email" autocomplete="email">
      </div>

      <div class="field">
        <label for="phone">Phone optional</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel">
      </div>

      <p class="hint">Use either email or phone. You do not need both.</p>
      <button id="login-button" type="submit">Login</button>
      <div class="message" id="message" role="status"></div>
    </form>

    <p class="switch">No account yet? <a href="signup.html">Sign up</a></p>
  </main>

  <script>
    const ENDPOINT = 'https://script.google.com/macros/s/AKfycbzacW67dhSwiZen8cUPtR0XmDo20BG5OnhsFFtxMc5OpH6Qlw-TMUufLxTIUFmDvx4/exec';
    const form = document.getElementById('login-form');
    const button = document.getElementById('login-button');
    const message = document.getElementById('message');

    function buildUrl(params) {
      const query = Object.keys(params)
        .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
        .join('&');
      return ENDPOINT + '?' + query;
    }

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message show ' + type;
    }

    function isSuccess(data) {
      const status = String(data.status || data.result || data.message || '').toLowerCase();
      return data.ok === true || data.success === true || status === 'ok' || status === 'success';
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name) {
        showMessage('Please enter your name.', 'error');
        return;
      }
      if (!email && !phone) {
        showMessage('Please enter either your email or phone number.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Logging in...';

      try {
        const url = buildUrl({mode:'login', name, email, phone});
        const response = await fetch(url, {method:'GET'});
        const data = await response.json();

        if (!response.ok || !isSuccess(data)) {
          throw new Error(data.error || data.reason || 'No account matched those details.');
        }

        const user = data.user || {name, email, phone};
        localStorage.setItem('user', JSON.stringify(user));
        showMessage('Login successful. Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'tools.html';
        }, 500);
      } catch (error) {
        showMessage(error.message || 'Login failed. Please try again.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
