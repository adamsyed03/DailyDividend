<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" href="/api/brand-logo">
  <title>Daily Dividend - Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#fafaf7;
      --paper:#fff;
      --ink:#0a0a0a;
      --ink2:#1f1f1f;
      --muted:#6b7280;
      --muted2:#9ca3af;
      --bd:#e8e5dc;
      --bd2:#d8d3c4;
      --grn:#0f9d6b;
      --grn-soft:#e6f7ef;
      --red:#d63939;
      --red-soft:rgba(214,57,57,.1);
      --red-br:rgba(214,57,57,.22);
      --serif:Georgia,"Times New Roman",serif;
      --sans:Arial,"Helvetica Neue",sans-serif;
      --mono:ui-monospace,monospace;
      --fx:cubic-bezier(.2,.8,.2,1);
    }
    html,body{height:100%;background:var(--bg)}
    body{min-height:100vh;font-family:var(--sans);color:var(--ink);display:grid;place-items:center;padding:16px;-webkit-font-smoothing:antialiased}
    .card{width:min(95vw,360px);background:var(--paper);border:1px solid var(--bd2);border-radius:12px;padding:20px;box-shadow:0 12px 32px rgba(10,10,10,.08)}
    .brand{display:flex;align-items:center;gap:8px;margin-bottom:20px}
    .brand-mark{width:28px;height:28px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:13px}
    .brand-mark img{width:100%;height:100%;object-fit:contain}
    .brand-name{font-weight:700;letter-spacing:-.01em;font-size:14px}
    .kicker{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);margin-bottom:8px}
    h1{font-family:var(--serif);font-size:28px;line-height:1.12;margin-bottom:6px;letter-spacing:-.02em}
    .sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:18px}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    input{font:inherit;font-size:14px;border:1px solid var(--bd2);border-radius:9px;padding:11px 12px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
    input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(15,157,107,.12)}
    input::placeholder{color:var(--muted2)}
    .hint{font-size:11px;color:var(--muted);line-height:1.4;margin:-2px 0 12px}
    button{width:100%;border:0;border-radius:999px;background:var(--ink);color:#fff;font:inherit;font-weight:600;font-size:14px;padding:12px 16px;cursor:pointer;transition:transform .15s,background .15s}
    button:hover{background:var(--grn);transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .message{display:none;margin-top:12px;border-radius:10px;padding:11px 12px;font-size:12px;line-height:1.4}
    .message.show{display:block}
    .message.error{background:var(--red-soft);color:var(--red);border:1px solid var(--red-br)}
    .message.success{background:var(--grn-soft);color:#0b6e4b;border:1px solid rgba(15,157,107,.24)}
    .switch{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
    .switch a{color:var(--ink);font-weight:600;text-decoration:none;transition:color .15s}
    .switch a:hover{color:var(--grn)}
    
    @media(min-width:640px){
      .card{width:min(460px,100%);padding:28px}
      h1{font-size:32px}
      .sub{font-size:15px;margin-bottom:20px}
      button{padding:13px 18px;font-size:15px}
      .message{font-size:13px}
      .switch{font-size:14px;margin-top:16px}
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-mark"><img src="/api/brand-logo" alt=""></div>
      <div class="brand-name">Daily Dividend</div>
    </div>

    <div class="kicker">Member Login</div>
    <h1>Welcome back.</h1>
    <p class="sub">Log in with your email or username.</p>

    <form id="login-form">
      <div class="field">
        <label for="email">Email or username</label>
        <input id="email" name="email" type="text" autocomplete="username" placeholder="you@email.com or @username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button id="login-button" type="submit">Login</button>
      <div class="message" id="message" role="status"></div>
    </form>

    <p class="switch">No account yet? <a href="onboarding.html">Sign up</a></p>
  </main>

  <script src="js/dd-backend.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const button = document.getElementById('login-button');
    const message = document.getElementById('message');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message show ' + type;
    }

    function isSuccess(data) {
      const status = String(data.status || data.result || data.message || '').toLowerCase();
      return data.ok === true || data.success === true || status === 'ok' || status === 'success';
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const identifier = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        showMessage('Please enter your email or username and password.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Logging in...';

      try {
        const { response, data } = await ddFetchJson({mode:'login', email: identifier, password}, 'Login request');

        if (!response.ok || !isSuccess(data)) {
          throw new Error(data.error || data.reason || 'No account matched those details.');
        }

        const user = data.user || {email};
        if (user.userId) {
          localStorage.setItem('dailyDividendUserId', user.userId);
        }
        localStorage.setItem('user', JSON.stringify(user));
        showMessage('Login successful. Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      } catch (error) {
        showMessage(error.message || 'Login failed. Please try again.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Login';
      }
    });
  </script>
  <script src="js/analytics.js"></script>
</body>
</html>
